<!DOCTYPE html>
<html class="dark" lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>RepEats - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#e5e2e1",
                        "secondary": "#ffb59c",
                        "on-secondary-fixed": "#390c00",
                        "secondary-container": "#fa5c1c",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-container": "#00f6f6",
                        "surface-dim": "#131313",
                        "inverse-primary": "#106e00",
                        "primary-fixed-dim": "#2ae500",
                        "background": "#131313",
                        "outline": "#85967c",
                        "primary-fixed": "#79ff5b",
                        "surface-bright": "#393939",
                        "on-primary-container": "#107100",
                        "on-surface-variant": "#baccb0",
                        "surface-container-highest": "#353534",
                        "inverse-on-surface": "#313030",
                        "surface-tint": "#2ae500",
                        "surface-container": "#201f1f",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-low": "#1c1b1b",
                        "on-error": "#690005",
                        "surface-variant": "#353534",
                        "on-background": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "primary-container": "#39ff14",
                        "error": "#ffb4ab",
                        "surface": "#131313",
                        "primary": "#39ff14",
                        "on-error-container": "#ffdad6"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-surface-container-low border border-surface-variant rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Decorazione luminosa sfocata -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 blur-3xl rounded-full"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-secondary/20 blur-3xl rounded-full"></div>

        <div class="relative z-10 text-center mb-8">
            <span class="material-symbols-outlined text-primary text-6xl mb-2">exercise</span>
            <h1 class="text-3xl font-bold text-primary tracking-tight">RepEats</h1>
            <p class="text-on-surface-variant text-sm mt-1">Accedi per continuare</p>
        </div>

        <form id="loginForm" class="relative z-10 space-y-5">
            <div id="errorMessage" class="hidden bg-error-container text-on-error-container p-3 rounded-xl text-sm font-semibold text-center"></div>

            <div>
                <label for="username" class="block text-sm font-semibold text-on-surface-variant mb-1">Username</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
                    <input type="text" id="username" name="username" required
                           class="w-full bg-surface-container border border-surface-variant rounded-xl py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-on-surface-variant mb-1">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
                    <input type="password" id="password" name="password" required
                           class="w-full bg-surface-container border border-surface-variant rounded-xl py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="rememberMe" class="w-4 h-4 text-primary bg-surface-container border-surface-variant rounded focus:ring-primary focus:ring-2">
                <label for="rememberMe" class="ml-2 text-sm font-semibold text-on-surface-variant">Ricordami (1 settimana)</label>
            </div>

            <button type="submit" 
                    class="w-full bg-primary text-on-primary font-bold rounded-xl py-3 mt-6 hover:bg-primary-fixed-dim transition-all shadow-[0_0_15px_rgba(57,255,20,0.3)] hover:shadow-[0_0_25px_rgba(57,255,20,0.5)]">
                Accedi
            </button>
        </form>

        <div class="relative z-10 mt-6 text-center text-sm text-on-surface-variant">
            Non hai un account? 
            <a href="register.html" class="text-primary font-semibold hover:underline">Registrati ora</a>
        </div>
    </div>

    <!-- Script per collegare il form al backend -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('errorMessage');
            errorBox.classList.add('hidden');
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                errorBox.textContent = "Tutti i campi sono obbligatori.";
                errorBox.classList.remove('hidden');
                return;
            }

            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z\d]).{8,}$/;
            if (!passwordRegex.test(password)) {
                errorBox.textContent = "La password deve contenere almeno 8 caratteri: 1 maiuscola, 1 minuscola, 1 numero e 1 carattere speciale.";
                errorBox.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Salviamo il solo token JWT (nessun dato utente in chiaro).
                    // sessionStorage: valido finché il tab/browser non viene chiuso.
                    sessionStorage.setItem('repEats_token', data.access_token);

                    if (rememberMe) {
                        // "Ricordami" attivo: salviamo anche in localStorage con scadenza 7 giorni
                        localStorage.setItem('repEats_token', data.access_token);
                        localStorage.setItem('repEats_expires', Date.now() + 7 * 24 * 60 * 60 * 1000);
                    } else {
                        // "Ricordami" disattivato: puliamo eventuali vecchi dati in localStorage
                        localStorage.removeItem('repEats_token');
                        localStorage.removeItem('repEats_expires');
                    }

                    // Usiamo replace per non aggiungere la pagina di login alla history
                    window.location.replace('/dashboard.html');
                } else {
                    // Errore nel login
                    errorBox.textContent = data.detail || "Errore durante il login";
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = "Impossibile connettersi al server.";
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

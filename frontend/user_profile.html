<script>
    const userId = localStorage.getItem('repEats_userId');
    if (!userId) {
        window.location.href = '/login.html';
    }

    // Nomi utente (si potrebbe prendere dinamicamente anche questo)
    const usernameDisplay = document.querySelector('h1');
    if(localStorage.getItem('repEats_username')){
        usernameDisplay.innerText = localStorage.getItem('repEats_username');
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = '/login.html';
    });

    // Carica dati del profilo
    async function loadProfile() {
        try {
            const res = await fetch(`/api/profile/get?user_id=${userId}`);
            if (res.ok) {
                const json = await res.json();
                const data = json.data;
                if (data.age) document.getElementById('age').value = data.age;
                if (data.height) document.getElementById('height').value = data.height;
                if (data.weight) document.getElementById('weight').value = data.weight;
                if (data.gender) document.getElementById('gender').value = data.gender;
                if (data.activity_level) document.getElementById('activity').value = data.activity_level;
                
                if (data.target_weight) document.getElementById('targetWeight').value = data.target_weight;
                if (data.target_weeks) document.getElementById('targetWeeks').value = data.target_weeks;
                if (data.goal_type) document.getElementById('goalType').value = data.goal_type;
            }
        } catch (e) {
            console.error("Errore caricamento profilo", e);
        }
    }

    // Salva dati del profilo
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const payload = {
            user_id: parseInt(userId),
            age: parseInt(document.getElementById('age').value) || 0,
            height: parseFloat(document.getElementById('height').value) || 0,
            weight: parseFloat(document.getElementById('weight').value) || 0,
            gender: document.getElementById('gender').value,
            activity_level: parseFloat(document.getElementById('activity').value) || 1.2,
            target_weight: parseFloat(document.getElementById('targetWeight').value) || 0,
            target_weeks: parseInt(document.getElementById('targetWeeks').value) || 0,
            goal_type: document.getElementById('goalType').value
        };

        const btn = document.getElementById('saveBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Salvataggio...`;

        try {
            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Salvato!`;
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            } else {
                alert("Errore nel salvataggio del profilo.");
                btn.innerHTML = originalText;
            }
        } catch (e) {
            alert("Errore di rete.");
            btn.innerHTML = originalText;
        }
    });

    // Inizializza
    loadProfile();

</script>

<script>
    const token = sessionStorage.getItem('repEats_token');

    if (!token) {
        window.location.replace('/login.html');
        throw new Error('AUTH_REDIRECT');
    }

    // Generazione dinamica dell'header Bearer per le request autorizzate
    const authHeaders = { 'Authorization': `Bearer ${token}` };

    // Middleware client-side per la validazione della completezza anagrafica
    async function checkProfileGuard() {
        try {
            const res = await fetch(`/api/profile/get`, { headers: authHeaders });
            if (res.ok) {
                const json = await res.json();
                if (!json.data.age || json.data.age === 0 || !json.data.weight || json.data.weight === 0) {
                    window.location.replace('dashboard.html');
                }
            }
        } catch(e) {}
    }
    checkProfileGuard();

    // Reference DOM per l'iniezione del parametro username a valle del caricamento asincrono
    const usernameDisplay = document.querySelector('h1');

    // Handler di revoca sessione locale ed evizione dei token
    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.clear();
        window.location.href = '/login.html';
    });

    // Buffer locale per la gestione reattiva delle intolleranze e allergie
    let allergiesList = [];

    // Metodo di patching del DOM per la rappresentazione visuale dei disclaimer medici
    function renderAllergies() {
        const container = document.getElementById('allergiesChips');
        container.innerHTML = '';
        allergiesList.forEach((item, idx) => {
            const chip = document.createElement('span');
            chip.className = 'inline-flex items-center gap-1 rounded-full px-3 py-1 text-label-sm font-label-sm bg-error-container/40 text-error border border-error/30';
            chip.innerHTML = `<span class="material-symbols-outlined text-[16px]">warning</span>${item}`;
            const rm = document.createElement('button');
            rm.type = 'button';
            rm.className = 'material-symbols-outlined text-[16px] hover:brightness-125';
            rm.textContent = 'close';
            rm.addEventListener('click', () => { allergiesList.splice(idx, 1); renderAllergies(); });
            chip.appendChild(rm);
            container.appendChild(chip);
        });
    }

    // Handler di inserimento con validazione anti-duplicazione case-insensitive
    function addAllergy() {
        const input = document.getElementById('allergyInput');
        const val = input.value.trim();
        if (val && !allergiesList.some(a => a.toLowerCase() === val.toLowerCase())) {
            allergiesList.push(val);
            renderAllergies();
        }
        input.value = '';
        input.focus();
    }

    document.getElementById('addAllergyBtn').addEventListener('click', addAllergy);
    document.getElementById('allergyInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addAllergy(); }
    });

    // Buffer locale per la gestione reattiva delle preferenze dietetiche
    let dietaryList = [];

    // Metodo di patching del DOM per la rappresentazione visuale dei pattern dietetici
    function renderDietary() {
        const container = document.getElementById('dietaryChips');
        container.innerHTML = '';
        dietaryList.forEach((item, idx) => {
            const chip = document.createElement('span');
            chip.className = 'inline-flex items-center gap-1 rounded-full px-3 py-1 text-label-sm font-label-sm bg-primary-container/20 text-primary-fixed border border-primary-fixed/30';
            chip.innerHTML = `<span class="material-symbols-outlined text-[16px]">eco</span>${item}`;
            const rm = document.createElement('button');
            rm.type = 'button';
            rm.className = 'material-symbols-outlined text-[16px] hover:brightness-125';
            rm.textContent = 'close';
            rm.addEventListener('click', () => { dietaryList.splice(idx, 1); renderDietary(); });
            chip.appendChild(rm);
            container.appendChild(chip);
        });
    }

    // Handler di inserimento pattern dietetico con validazione anti-duplicazione
    function addDietary() {
        const input = document.getElementById('dietaryInput');
        const val = input.value.trim();
        if (val && !dietaryList.some(d => d.toLowerCase() === val.toLowerCase())) {
            dietaryList.push(val);
            renderDietary();
        }
        input.value = '';
        input.focus();
    }

    document.getElementById('addDietaryBtn').addEventListener('click', addDietary);
    document.getElementById('dietaryInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addDietary(); }
    });

    // Fase di hydration asincrona dello stato applicativo e binding dei valori preesistenti
    async function loadProfile() {
        try {
            const res = await fetch(`/api/profile/get`, { headers: authHeaders });
            if (res.ok) {
                const json = await res.json();
                const data = json.data;
                if (data.username) usernameDisplay.innerText = data.username;
                if (data.age) document.getElementById('age').value = data.age;
                if (data.height) document.getElementById('height').value = data.height;
                if (data.weight) document.getElementById('weight').value = data.weight;
                if (data.gender) document.getElementById('gender').value = data.gender;
                if (data.activity_level) document.getElementById('activity').value = data.activity_level;
                
                if (data.target_weight) document.getElementById('targetWeight').value = data.target_weight;
                if (data.target_weeks) document.getElementById('targetWeeks').value = data.target_weeks;
                if (data.goal_type) document.getElementById('goalType').value = data.goal_type;
                if (data.workout_duration) document.getElementById('workoutDuration').value = data.workout_duration;
                if (data.workout_preference) document.getElementById('workoutPreference').value = data.workout_preference;

                if (data.allergies) allergiesList = data.allergies.split(',').map(s => s.trim()).filter(Boolean);
                if (data.dietary_preferences) dietaryList = data.dietary_preferences.split(',').map(s => s.trim()).filter(Boolean);
                renderAllergies();
                renderDietary();
            }
        } catch (e) {
            console.error("Errore caricamento profilo", e);
        }
    }

    // Handler di consolidamento e mutazione dello stato persistente verso il backend
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const payload = {
            age: parseInt(document.getElementById('age').value) || 0,
            height: parseFloat(document.getElementById('height').value) || 0,
            weight: parseFloat(document.getElementById('weight').value) || 0,
            gender: document.getElementById('gender').value,
            activity_level: parseFloat(document.getElementById('activity').value) || 1.2,
            target_weight: parseFloat(document.getElementById('targetWeight').value) || 0,
            target_weeks: parseInt(document.getElementById('targetWeeks').value) || 0,
            goal_type: document.getElementById('goalType').value,
            workout_duration: parseInt(document.getElementById('workoutDuration').value) || 60,
            workout_preference: document.getElementById('workoutPreference').value || 'Ipertrofia',
            allergies: allergiesList.join(', '),
            dietary_preferences: dietaryList.join(', ')
        };

        const btn = document.getElementById('saveBtn');
        const originalText = btn.innerHTML;

        if (!payload.age || !payload.height || !payload.weight || !payload.target_weight || !payload.target_weeks) {
            alert("Tutti i campi numerici devono essere compilati con valori maggiori di zero.");
            return;
        }

        btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Salvataggio...`;

        try {
            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeaders },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                renderAllergies();
                renderDietary();
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Salvato!`;
                setTimeout(() => { btn.innerHTML = originalText; }, 2000);
            } else {
                alert("Errore nel salvataggio del profilo.");
                btn.innerHTML = originalText;
            }
        } catch (e) {
            alert("Errore di rete.");
            btn.innerHTML = originalText;
        }
    });

    // Bootstrapping del modulo
    loadProfile();

</script>
</body></html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>RepEats</title>
    <script>
        // Author: Timothy Giolito (20054431)
        // Verifico la presenza del token di accesso dando la priorità alla sessione temporanea rispetto all'archiviazione locale permanente.
        let token = sessionStorage.getItem('repEats_token');
        if (!token) {
            token = localStorage.getItem('repEats_token');
            const expires = localStorage.getItem('repEats_expires');
            if (expires && Date.now() > parseInt(expires)) {
                localStorage.removeItem('repEats_token');
                localStorage.removeItem('repEats_expires');
                token = null;
            }
        }
        if (token) {
            window.location.replace('/dashboard.html');
        } else {
            window.location.replace('/login.html');
        }
    </script>
</head>
<body>
</body>
</html>

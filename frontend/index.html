<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>RepEats</title>
    <script>
        // Author: Timothy Giolito (20054431)
        // Verifico la presenza del token di accesso dando la priorità alla sessione temporanea rispetto all'archiviazione locale permanente.
        const token = sessionStorage.getItem('repEats_token');
        if (token) {
            window.location.replace('/dashboard.html');
        } else {
            window.location.replace('/login.html');
        }
    </script>
</head>

</html>
